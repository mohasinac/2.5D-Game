services:
  server:
    build:
      context: .
      target: dev           # ts-node + nodemon — fast hot reload, no tsc compile step
    ports:
      - "2567:2567"
    volumes:
      - ./server:/app/server      # live reload on server changes
      - ./shared:/app/shared      # shared types (server imports from here)
      - ./tsconfig.json:/app/tsconfig.json
    env_file:
      - .env                # reads PORT, FIREBASE_ADMIN_* from your local .env
    environment:
      NODE_ENV: development
